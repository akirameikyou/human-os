<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human OS</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #06001f;
      color: #fff;
      font-family: "Times New Roman", "Yu Mincho", "Hiragino Mincho ProN", serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 48%, rgba(115, 95, 240, 0.105), transparent 24%),
        radial-gradient(circle at 50% 72%, rgba(70, 45, 160, 0.07), transparent 32%),
        linear-gradient(180deg, #110052 0%, #08002d 58%, #02000d 100%);
      pointer-events: none;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .axis {
      position: absolute;
      top: -14vh;
      left: 50%;
      width: 1px;
      height: 70vh;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(255,255,255,0.08) 12%,
        rgba(255,255,255,0.28) 44%,
        rgba(255,255,255,0.82) 76%,
        rgba(255,255,255,0.46) 100%
      );
      filter: drop-shadow(0 0 5px rgba(255,255,255,0.44));
      opacity: 0;
      animation:
        axisAppear 5.4s cubic-bezier(.22,.8,.22,1) forwards .2s,
        axisBreath 11s ease-in-out infinite 5.6s;
    }

    .title {
      position: absolute;
      top: 37.5vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(34px, 4vw, 62px);
      font-weight: 400;
      letter-spacing: 0.16em;
      white-space: nowrap;
      opacity: 0;
      text-shadow:
        0 0 5px rgba(255,255,255,0.22),
        0 0 13px rgba(210,205,255,0.14);
      animation: titleAppear 5.2s cubic-bezier(.22,.8,.22,1) forwards 2.2s;
    }

    .prism {
      position: absolute;
      top: 52vh;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 21px solid transparent;
      border-right: 21px solid transparent;
      border-bottom: 40px solid rgba(255,255,255,0.155);
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.30));
      opacity: 0;
      animation:
        fadeIn 4.2s ease forwards 1.55s,
        prismBreath 12s ease-in-out infinite 6s;
    }

    .rainbow {
      position: absolute;
      top: calc(52vh + 20px);
      left: 50%;
      width: 148px;
      height: 190px;
      transform: translateX(-50%);
      opacity: 0;
      animation: fadeIn 5s ease forwards 2.6s;
    }

    .ray {
      position: absolute;
      top: 0;
      left: 50%;
      width: 0.55px;
      height: 158px;
      transform-origin: top center;
      background: currentColor;
      border-radius: 999px;
      opacity: 0.35;
      box-shadow:
        0 0 1.5px currentColor,
        0 0 4.5px currentColor;
      animation: rayShade 12s ease-in-out infinite;
    }

    .ray:nth-child(1) { color: #a93535; transform: translateX(-50%) rotate(15.5deg); animation-delay: 0.1s; }
    .ray:nth-child(2) { color: #b86d28; transform: translateX(-50%) rotate(10.2deg); animation-delay: 0.3s; }
    .ray:nth-child(3) { color: #bdb244; transform: translateX(-50%) rotate(5.1deg); animation-delay: 0.5s; }
    .ray:nth-child(4) { color: #3eb15c; transform: translateX(-50%) rotate(0deg); animation-delay: 0.7s; }
    .ray:nth-child(5) { color: #30a9ba; transform: translateX(-50%) rotate(-5.1deg); animation-delay: 0.5s; }
    .ray:nth-child(6) { color: #4364b8; transform: translateX(-50%) rotate(-10.2deg); animation-delay: 0.3s; }
    .ray:nth-child(7) { color: #7448b7; transform: translateX(-50%) rotate(-15.5deg); animation-delay: 0.1s; }

    .enter {
      position: absolute;
      bottom: 15.3vh;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      font-size: 10.5px;
      letter-spacing: 0.25em;
      opacity: 0;
      text-shadow: 0 0 6px rgba(210,220,255,0.20);
      animation:
        fadeIn 3.8s ease forwards 6.2s,
        enterReflection 12s ease-in-out infinite 8s;
    }

    .enter::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 22px;
      width: 64px;
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(
        90deg,
        transparent,
        rgba(210,220,255,0.22),
        transparent
      );
      opacity: 0;
      filter: blur(0.6px);
      animation: lakeLight 12s ease-in-out infinite 8s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes axisAppear {
      from {
        opacity: 0;
        transform: translateY(-34px);
      }
      to {
        opacity: 0.64;
        transform: translateY(0);
      }
    }

    @keyframes axisBreath {
      0%, 100% { opacity: 0.52; }
      50% { opacity: 0.72; }
    }

    @keyframes titleAppear {
      0% {
        opacity: 0;
        letter-spacing: 0.22em;
        filter: blur(3px);
      }
      72% {
        opacity: 0.92;
        filter: blur(0.3px);
      }
      100% {
        opacity: 1;
        letter-spacing: 0.16em;
        filter: blur(0);
      }
    }

    @keyframes prismBreath {
      0%, 100% {
        opacity: 0.42;
        filter: drop-shadow(0 0 7px rgba(255,255,255,0.24));
      }
      50% {
        opacity: 0.58;
        filter: drop-shadow(0 0 11px rgba(255,255,255,0.34));
      }
    }

    @keyframes rayShade {
      0%, 100% {
        opacity: 0.20;
        box-shadow:
          0 0 1px currentColor,
          0 0 3px currentColor;
      }
      50% {
        opacity: 0.42;
        box-shadow:
          0 0 1.6px currentColor,
          0 0 5.5px currentColor;
      }
    }

    @keyframes enterReflection {
      0%, 100% {
        text-shadow: 0 0 5px rgba(210,220,255,0.15);
      }
      50% {
        text-shadow: 0 0 9px rgba(210,220,255,0.28);
      }
    }

    @keyframes lakeLight {
      0%, 100% { opacity: 0; width: 42px; }
      50% { opacity: 0.28; width: 72px; }
    }

    @media (max-width: 700px) {
      .title {
        top: 36vh;
        font-size: 34px;
      }

      .prism {
        top: 51.5vh;
      }

      .rainbow {
        top: calc(51.5vh + 20px);
        width: 125px;
      }

      .enter {
        bottom: 17vh;
      }
    }
  </style>
</head>

<body>
  <main class="stage">
    <div class="axis"></div>

    <h1 class="title">HUMAN OS</h1>

    <div class="prism"></div>

    <div class="rainbow">
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
    </div>

    <div class="enter">ENTER</div>
  </main>
</body>
</html>
