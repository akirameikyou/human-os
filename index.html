<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human OS</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #12035c;
      color: #fff;
      font-family: "Times New Roman", "Yu Mincho", "Hiragino Mincho ProN", serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.08), transparent 23%),
        radial-gradient(circle at 50% 72%, rgba(120,90,255,0.18), transparent 28%),
        linear-gradient(180deg, #17056f 0%, #110252 58%, #080120 100%);
      pointer-events: none;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .title {
      position: absolute;
      top: 34vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(30px, 4vw, 58px);
      font-weight: 400;
      letter-spacing: 0.12em;
      white-space: nowrap;
      opacity: 0;
      animation: fadeIn 3.6s ease forwards 3.2s;
    }

    .axis {
      position: absolute;
      top: 4vh;
      left: 50%;
      width: 1px;
      height: 55vh;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(255,255,255,0.25) 8%,
        rgba(255,255,255,0.95) 48%,
        rgba(255,255,255,0.62) 100%
      );
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
      opacity: 0;
      animation: fadeIn 3s ease forwards 0.6s, axisBreathe 6s ease-in-out infinite 3s;
    }

    .prism {
      position: absolute;
      top: 49vh;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-bottom: 34px solid rgba(255,255,255,0.34);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.55));
      opacity: 0;
      animation: fadeIn 3s ease forwards 1.8s;
    }

    .rainbow {
      position: absolute;
      top: calc(49vh + 34px);
      left: 50%;
      width: 110px;
      height: 115px;
      transform: translateX(-50%);
      opacity: 0;
      animation: fadeIn 3.8s ease forwards 2.4s;
    }

    .ray {
      position: absolute;
      top: 0;
      left: 50%;
      width: 5px;
      height: 96px;
      border-radius: 999px;
      transform-origin: top center;
      filter: blur(0.4px) drop-shadow(0 0 9px currentColor);
      opacity: 0.82;
      animation: rayBreathe 6.5s ease-in-out infinite;
    }

    .ray:nth-child(1) { color: #ff2020; background: currentColor; transform: translateX(-50%) rotate(13deg); }
    .ray:nth-child(2) { color: #ff8a00; background: currentColor; transform: translateX(-50%) rotate(8deg); }
    .ray:nth-child(3) { color: #ffe900; background: currentColor; transform: translateX(-50%) rotate(4deg); }
    .ray:nth-child(4) { color: #22ff5c; background: currentColor; transform: translateX(-50%) rotate(0deg); }
    .ray:nth-child(5) { color: #00e8ff; background: currentColor; transform: translateX(-50%) rotate(-4deg); }
    .ray:nth-child(6) { color: #2f73ff; background: currentColor; transform: translateX(-50%) rotate(-8deg); }
    .ray:nth-child(7) { color: #b04dff; background: currentColor; transform: translateX(-50%) rotate(-13deg); }

    .enter {
      position: absolute;
      bottom: 25vh;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      font-size: 11px;
      letter-spacing: 0.22em;
      opacity: 0;
      animation: fadeIn 3s ease forwards 5.8s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes axisBreathe {
      0%, 100% { opacity: 0.72; }
      50% { opacity: 1; }
    }

    @keyframes rayBreathe {
      0%, 100% {
        opacity: 0.58;
        height: 82px;
      }
      50% {
        opacity: 0.95;
        height: 112px;
      }
    }

    @media (max-width: 700px) {
      .title {
        top: 32vh;
        font-size: 34px;
      }

      .axis {
        height: 52vh;
      }

      .prism {
        top: 48vh;
      }

      .rainbow {
        top: calc(48vh + 34px);
      }

      .enter {
        bottom: 22vh;
      }
    }
  </style>
</head>

<body>
  <main class="stage">
    <div class="axis"></div>

    <h1 class="title">HUMAN OS</h1>

    <div class="prism"></div>

    <div class="rainbow">
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
    </div>

    <div class="enter">ENTER</div>
  </main>
</body>
</html>
