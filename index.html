<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human OS</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070024;
      color: #fff;
      font-family: "Times New Roman", "Yu Mincho", "Hiragino Mincho ProN", serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 47%, rgba(150,125,255,0.16), transparent 23%),
        radial-gradient(circle at 50% 66%, rgba(80,50,190,0.11), transparent 31%),
        linear-gradient(180deg, #12005c 0%, #090036 60%, #020010 100%);
      pointer-events: none;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .axis {
      position: absolute;
      top: -8vh;
      left: 50%;
      width: 1px;
      height: 64vh;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(255,255,255,0.10) 8%,
        rgba(255,255,255,0.55) 46%,
        rgba(255,255,255,0.92) 76%,
        rgba(255,255,255,0.48) 100%
      );
      filter: drop-shadow(0 0 7px rgba(255,255,255,0.55));
      opacity: 0;
      animation: axisAppear 4.2s ease forwards 0.2s, axisBreath 8s ease-in-out infinite 4.5s;
    }

    .title {
      position: absolute;
      top: 38vh;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(34px, 4vw, 62px);
      font-weight: 400;
      letter-spacing: 0.16em;
      white-space: nowrap;
      opacity: 0;
      text-shadow:
        0 0 10px rgba(255,255,255,0.18),
        0 0 34px rgba(180,160,255,0.22);
      animation: titleAppear 4.4s ease forwards 2.3s;
    }

    .title::before {
      content: "";
      position: absolute;
      inset: -28px -80px;
      background: radial-gradient(circle, rgba(180,160,255,0.16), transparent 62%);
      z-index: -1;
      opacity: 0;
      animation: titleHalo 5.2s ease forwards 2.8s;
    }

    .prism {
      position: absolute;
      top: 52vh;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 42px solid rgba(255,255,255,0.18);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.38));
      opacity: 0;
      animation: fadeIn 3.4s ease forwards 1.6s, prismBreath 8s ease-in-out infinite 5s;
    }

    .rainbow {
      position: absolute;
      top: calc(52vh + 42px);
      left: 50%;
      width: 150px;
      height: 170px;
      transform: translateX(-50%);
      opacity: 0;
      animation: fadeIn 4s ease forwards 2.4s;
    }

    .ray {
      position: absolute;
      top: 0;
      left: 50%;
      width: 0.7px;
      height: 146px;
      transform-origin: top center;
      background: currentColor;
      border-radius: 999px;
      opacity: 0.46;
      box-shadow:
        0 0 2px currentColor,
        0 0 5px currentColor,
        0 0 10px rgba(255,255,255,0.03);
      animation: rayShade 8s ease-in-out infinite;
    }

    .ray:nth-child(1) { color: #cc3030; transform: translateX(-50%) rotate(16deg); }
    .ray:nth-child(2) { color: #d98222; transform: translateX(-50%) rotate(10.5deg); }
    .ray:nth-child(3) { color: #d6c94a; transform: translateX(-50%) rotate(5.2deg); }
    .ray:nth-child(4) { color: #43cf64; transform: translateX(-50%) rotate(0deg); }
    .ray:nth-child(5) { color: #2fc4d6; transform: translateX(-50%) rotate(-5.2deg); }
    .ray:nth-child(6) { color: #4a72d6; transform: translateX(-50%) rotate(-10.5deg); }
    .ray:nth-child(7) { color: #8a52d6; transform: translateX(-50%) rotate(-16deg); }

    .enter {
      position: absolute;
      bottom: 15.5vh;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      font-size: 11px;
      letter-spacing: 0.24em;
      opacity: 0;
      animation: fadeIn 3s ease forwards 5.8s;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes axisAppear {
      from {
        opacity: 0;
        transform: translateY(-18px);
      }
      to {
        opacity: 0.72;
        transform: translateY(0);
      }
    }

    @keyframes axisBreath {
      0%, 100% { opacity: 0.58; }
      50% { opacity: 0.82; }
    }

    @keyframes titleAppear {
      from {
        opacity: 0;
        letter-spacing: 0.22em;
        filter: blur(3px);
      }
      to {
        opacity: 1;
        letter-spacing: 0.16em;
        filter: blur(0);
      }
    }

    @keyframes titleHalo {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes prismBreath {
      0%, 100% {
        opacity: 0.48;
        filter: drop-shadow(0 0 8px rgba(255,255,255,0.28));
      }
      50% {
        opacity: 0.68;
        filter: drop-shadow(0 0 13px rgba(255,255,255,0.42));
      }
    }

    @keyframes rayShade {
      0%, 100% {
        opacity: 0.28;
        box-shadow:
          0 0 1px currentColor,
          0 0 4px currentColor;
      }
      50% {
        opacity: 0.58;
        box-shadow:
          0 0 2px currentColor,
          0 0 7px currentColor;
      }
    }

    @media (max-width: 700px) {
      .title {
        top: 36vh;
        font-size: 34px;
      }

      .prism {
        top: 51vh;
      }

      .rainbow {
        top: calc(51vh + 42px);
        width: 125px;
      }

      .enter {
        bottom: 17vh;
      }
    }
  </style>
</head>

<body>
  <main class="stage">
    <div class="axis"></div>

    <h1 class="title">HUMAN OS</h1>

    <div class="prism"></div>

    <div class="rainbow">
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
      <div class="ray"></div>
    </div>

    <div class="enter">ENTER</div>
  </main>
</body>
</html>
