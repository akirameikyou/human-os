<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Master Observatory / Human OS Institute</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:#050018;
  color:#f4f1ff;
  font-family:"Yu Mincho","Hiragino Mincho ProN","Times New Roman",serif;
  line-height:1.9;
}
button,input,textarea,select{font:inherit}
a{color:inherit;text-decoration:none}

/* LOCK */
.lock{
  position:fixed;
  inset:0;
  z-index:99;
  background:
    radial-gradient(circle at 50% 38%,rgba(120,100,255,.12),transparent 28%),
    linear-gradient(180deg,#090032,#02000d);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.lock-box{
  width:min(440px,100%);
  border:1px solid rgba(244,241,255,.18);
  padding:42px 34px;
  text-align:center;
  background:rgba(255,255,255,.035);
  box-shadow:0 0 80px rgba(120,100,255,.08);
}
.lock-box h1{
  font-size:26px;
  font-weight:400;
  letter-spacing:.14em;
  margin-bottom:12px;
}
.lock-box p{
  font-size:14px;
  color:rgba(244,241,255,.65);
  margin-bottom:26px;
}
.lock-box input{
  width:100%;
  padding:14px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.22);
  color:white;
  text-align:center;
  letter-spacing:.18em;
  margin-bottom:18px;
}
.lock-box button{
  padding:12px 28px;
  border:1px solid rgba(255,255,255,.24);
  background:transparent;
  color:white;
  letter-spacing:.16em;
  cursor:pointer;
}
.error{
  color:#ffb6b6;
  font-size:13px;
  margin-top:16px;
  min-height:20px;
}

/* MASTER */
.master{
  display:none;
  min-height:100vh;
  padding:8vh 5vw 12vh;
}
.master.active{display:block}

.master-head{
  max-width:1220px;
  margin:0 auto 42px;
}
.kicker{
  font-family:"Yu Gothic","Hiragino Sans",sans-serif;
  font-size:12px;
  letter-spacing:.24em;
  color:rgba(244,241,255,.52);
  margin-bottom:22px;
}
.master-head h2{
  font-size:clamp(30px,4vw,54px);
  font-weight:400;
  letter-spacing:.08em;
  line-height:1.35;
  margin-bottom:18px;
}
.master-head p{
  color:rgba(244,241,255,.72);
  max-width:860px;
}

/* CONSOLE */
.console{
  max-width:1220px;
  margin:0 auto;
  display:grid;
  grid-template-columns:280px 1fr 390px;
  gap:34px;
  align-items:center;
}
.panel{
  border:1px solid rgba(244,241,255,.16);
  padding:28px;
  background:rgba(255,255,255,.035);
}
.panel h3{
  font-size:20px;
  font-weight:400;
  letter-spacing:.1em;
  margin-bottom:18px;
}
.layer-menu button{
  display:block;
  width:100%;
  text-align:left;
  margin-bottom:10px;
  padding:12px 14px;
  background:transparent;
  color:rgba(244,241,255,.75);
  border:1px solid rgba(244,241,255,.12);
  cursor:pointer;
}
.layer-menu button:hover{
  color:white;
  border-color:rgba(244,241,255,.35);
}
.layer-group-title{
  margin-top:28px!important;
  color:rgba(244,241,255,.55);
}

/* HUMAN MODEL */
.body-model{
  position:relative;
  height:740px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.field{
  position:absolute;
  width:390px;
  height:700px;
  border-radius:50%;
  border:1px solid rgba(244,241,255,.08);
  box-shadow:0 0 80px rgba(130,110,255,.08) inset;
}
.gravity-line{
  position:absolute;
  top:16px;
  bottom:60px;
  width:1px;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.35),transparent);
  opacity:.45;
}
.ground{
  position:absolute;
  bottom:82px;
  width:370px;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.30),transparent);
}
.earth-star{
  position:absolute;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  color:#9b6bff;
  width:20px;
  height:20px;
  z-index:8;
}
.human-shape{
  position:relative;
  width:270px;
  height:620px;
}
.head{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:84px;
  height:84px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);
}
.neck{
  position:absolute;
  top:76px;
  left:50%;
  transform:translateX(-50%);
  width:34px;
  height:44px;
  border-radius:18px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
}
.shoulders{
  position:absolute;
  top:108px;
  left:50%;
  transform:translateX(-50%);
  width:220px;
  height:78px;
  border-radius:100px 100px 42px 42px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.10);
}
.torso{
  position:absolute;
  top:130px;
  left:50%;
  transform:translateX(-50%);
  width:138px;
  height:306px;
  border-radius:68px 68px 48px 48px;
  background:radial-gradient(ellipse at center,rgba(255,255,255,.12),rgba(255,255,255,.035));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 0 48px rgba(120,100,255,.10);
}
.arm{
  position:absolute;
  top:158px;
  width:28px;
  height:270px;
  border-radius:30px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.09);
}
.left-arm{left:32px;transform:rotate(7deg)}
.right-arm{right:32px;transform:rotate(-7deg)}
.leg{
  position:absolute;
  top:410px;
  width:36px;
  height:190px;
  border-radius:30px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.09);
}
.left-leg{left:100px}
.right-leg{right:100px}

.chakra{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:22px;
  height:22px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.5);
  background:currentColor;
  box-shadow:0 0 16px currentColor;
  cursor:pointer;
  z-index:12;
}
.chakra.active{
  width:30px;
  height:30px;
  box-shadow:0 0 30px currentColor;
}
.c7{top:-16px;color:#b48cff}
.c6{top:38px;color:#5f7dff}
.c5{top:128px;color:#31b7c8}
.c4{top:222px;color:#3fbd62}
.c3{top:315px;color:#c9bd45}
.c2{top:415px;color:#c77723}
.c1{top:518px;color:#bd3333}

/* OPTIONAL LAYERS */
.skeleton-layer,.portal-layer,.flow-layer{display:none}
.body-model.show-skeleton .skeleton-layer,
.body-model.show-portal .portal-layer,
.body-model.show-flow .flow-layer{display:block}

.spine{
  position:absolute;
  top:92px;
  left:50%;
  transform:translateX(-50%);
  width:2px;
  height:368px;
  background:rgba(255,255,255,.24);
  box-shadow:0 0 8px rgba(255,255,255,.22);
  z-index:6;
}
.rib{
  position:absolute;
  top:166px;
  left:50%;
  transform:translateX(-50%);
  width:96px;
  height:92px;
  border:1px solid rgba(255,255,255,.18);
  border-radius:50%;
  z-index:6;
}
.pelvis{
  position:absolute;
  top:405px;
  left:50%;
  transform:translateX(-50%);
  width:96px;
  height:54px;
  border:1px solid rgba(255,255,255,.18);
  border-radius:50%;
  z-index:6;
}
.portal{
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.45);
  box-shadow:0 0 16px rgba(255,255,255,.28);
  z-index:9;
}
.left-hand{top:405px;left:30px}
.right-hand{top:405px;right:30px}
.left-foot{top:590px;left:100px}
.right-foot{top:590px;right:100px}
.flow-line{
  position:absolute;
  top:102px;
  height:430px;
  width:1px;
  background:linear-gradient(180deg,transparent,rgba(255,255,255,.22),transparent);
  z-index:5;
}
.flow-line.center{left:50%}
.flow-line.left{left:43%;transform:rotate(5deg)}
.flow-line.right{right:43%;transform:rotate(-5deg)}

/* DETAIL */
.detail-panel h4{
  font-size:24px;
  font-weight:400;
  letter-spacing:.08em;
  margin-bottom:6px;
}
.detail-panel .sub{
  font-size:13px;
  color:rgba(244,241,255,.48);
  margin-bottom:22px;
}
.detail-section{margin-bottom:22px}
.detail-section h5{
  font-size:13px;
  font-family:"Yu Gothic","Hiragino Sans",sans-serif;
  letter-spacing:.14em;
  color:rgba(244,241,255,.48);
  margin-bottom:8px;
}
.detail-section ul{
  padding-left:1.1em;
  color:rgba(244,241,255,.78);
  font-size:14px;
}
.note{
  margin-top:24px;
  padding-top:18px;
  border-top:1px solid rgba(244,241,255,.14);
  color:rgba(244,241,255,.55);
  font-size:13px;
}

/* OBSERVATION NOTES */
.notes{
  max-width:1220px;
  margin:52px auto 0;
  border:1px solid rgba(244,241,255,.16);
  background:rgba(255,255,255,.035);
  padding:32px;
}
.notes h3{
  font-size:24px;
  font-weight:400;
  letter-spacing:.1em;
  margin-bottom:10px;
}
.notes p{
  color:rgba(244,241,255,.62);
  font-size:14px;
  margin-bottom:24px;
}
.note-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}
.note-field label{
  display:block;
  font-family:"Yu Gothic","Hiragino Sans",sans-serif;
  font-size:12px;
  letter-spacing:.12em;
  color:rgba(244,241,255,.55);
  margin-bottom:8px;
}
.note-field input,
.note-field select,
.note-field textarea{
  width:100%;
  padding:12px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.16);
  color:#f4f1ff;
}
.note-field textarea{
  min-height:100px;
  resize:vertical;
}
.note-field.full{grid-column:1/-1}
.note-actions{
  margin-top:22px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.note-actions button,
.back-link{
  display:inline-block;
  padding:11px 18px;
  border:1px solid rgba(255,255,255,.20);
  background:transparent;
  color:#f4f1ff;
  letter-spacing:.12em;
  cursor:pointer;
  font-family:"Yu Gothic","Hiragino Sans",sans-serif;
  font-size:12px;
}
.copy-status{
  margin-top:14px;
  color:rgba(244,241,255,.56);
  font-size:13px;
}

/* MOBILE */
@media(max-width:980px){
  .master{padding:7vh 5vw 10vh}
  .console{grid-template-columns:1fr}
  .layer-menu{order:1}
  .body-model{order:2;height:700px}
  .detail-panel{order:3}
  .note-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .body-model{height:610px;transform:scale(.84)}
  .lock-box{padding:34px 24px}
  .panel,.notes{padding:24px}
}
</style>
</head>

<body>

<div class="lock" id="lock">
  <div class="lock-box">
    <h1>MASTER</h1>
    <p>チクラカムワザ受講者用の観察補助ページです。</p>
    <input id="password" type="password" placeholder="PASSWORD" />
    <button onclick="checkPassword()">ENTER</button>
    <div class="error" id="error"></div>
  </div>
</div>

<main class="master" id="master">
  <div class="master-head">
    <div class="kicker">HUMAN OS INSTITUTE / MASTER OBSERVATORY</div>
    <h2>人体を観察点とする。</h2>
    <p>
      各チャクラを入口に、身体機能・神経系・内分泌・内臓・感情・象徴体系・未解決の問いをリンクする、学習補助用の実験ページです。
    </p>
  </div>

  <div class="console">
    <div class="panel layer-menu">
      <h3>Chakra</h3>
      <button onclick="selectChakra('earth')">アーススターチャクラ</button>
      <button onclick="selectChakra('c1')">第一チャクラ</button>
      <button onclick="selectChakra('c2')">第二チャクラ</button>
      <button onclick="selectChakra('c3')">第三チャクラ</button>
      <button onclick="selectChakra('c4')">第四チャクラ</button>
      <button onclick="selectChakra('c5')">第五チャクラ</button>
      <button onclick="selectChakra('c6')">第六チャクラ</button>
      <button onclick="selectChakra('c7')">第七チャクラ</button>

      <h3 class="layer-group-title">Body Layers</h3>
      <button onclick="toggleLayer('skeleton')">Skeleton / 筋骨格</button>
      <button onclick="toggleLayer('portal')">Portal / 手足</button>
      <button onclick="toggleLayer('flow')">Flow / 経絡・循環</button>

      <div style="margin-top:28px">
        <a class="back-link" href="index.html">PUBLIC SITE</a>
      </div>
    </div>

    <div class="body-model">
      <div class="gravity-line"></div>
      <div class="field"></div>
      <div class="ground"></div>

      <button class="earth-star chakra earth" onclick="selectChakra('earth')"></button>

      <div class="human-shape">
        <div class="head"></div>
        <div class="neck"></div>
        <div class="shoulders"></div>
        <div class="torso"></div>
        <div class="left-arm arm"></div>
        <div class="right-arm arm"></div>
        <div class="left-leg leg"></div>
        <div class="right-leg leg"></div>

        <div class="skeleton-layer">
          <div class="spine"></div>
          <div class="rib"></div>
          <div class="pelvis"></div>
        </div>

        <div class="flow-layer">
          <div class="flow-line center"></div>
          <div class="flow-line left"></div>
          <div class="flow-line right"></div>
        </div>

        <div class="portal-layer">
          <div class="portal left-hand"></div>
          <div class="portal right-hand"></div>
          <div class="portal left-foot"></div>
          <div class="portal right-foot"></div>
        </div>

        <button class="chakra c7" onclick="selectChakra('c7')"></button>
        <button class="chakra c6" onclick="selectChakra('c6')"></button>
        <button class="chakra c5" onclick="selectChakra('c5')"></button>
        <button class="chakra c4" onclick="selectChakra('c4')"></button>
        <button class="chakra c3 active" onclick="selectChakra('c3')"></button>
        <button class="chakra c2" onclick="selectChakra('c2')"></button>
        <button class="chakra c1" onclick="selectChakra('c1')"></button>
      </div>
    </div>

    <div class="panel detail-panel" id="detail"></div>
  </div>

  <section class="notes" id="notes">
    <h3>Observation Notes</h3>
    <p>
      ここに書いた内容はまだ保存されません。COPY NOTEでコピーし、チャクラマスターページやフォームへ貼り付ける運用を想定しています。
    </p>

    <div class="note-grid">
      <div class="note-field">
        <label>NAME / 名前</label>
        <input id="noteName" placeholder="任意" />
      </div>

      <div class="note-field">
        <label>CHAKRA / 関連チャクラ</label>
        <select id="noteChakra">
          <option>アーススターチャクラ</option>
          <option>第一チャクラ</option>
          <option>第二チャクラ</option>
          <option selected>第三チャクラ</option>
          <option>第四チャクラ</option>
          <option>第五チャクラ</option>
          <option>第六チャクラ</option>
          <option>第七チャクラ</option>
          <option>全体・その他</option>
        </select>
      </div>

      <div class="note-field full">
        <label>BODY / 身体感覚</label>
        <textarea id="noteBody" placeholder="例：みぞおち、腹、胸、手足、呼吸、温度感など"></textarea>
      </div>

      <div class="note-field full">
        <label>EMOTION / 感情・気づき</label>
        <textarea id="noteEmotion" placeholder="例：安心、不安、怒り、喜び、緊張、解放感など"></textarea>
      </div>

      <div class="note-field full">
        <label>RELATION / 関連しそうな知識・体験</label>
        <textarea id="noteRelation" placeholder="例：内臓、神経、東洋医学、武道、夢、対人関係、記憶など"></textarea>
      </div>

      <div class="note-field full">
        <label>QUESTION / 未解決の問い</label>
        <textarea id="noteQuestion" placeholder="例：この感覚は何と関係しているのか？"></textarea>
      </div>
    </div>

    <div class="note-actions">
      <button onclick="copyNote()">COPY NOTE</button>
      <button onclick="clearNote()">CLEAR</button>
    </div>
    <div class="copy-status" id="copyStatus"></div>
  </section>
</main>

function checkPassword(){
  const value = document.getElementById("password").value;
  if(value === MASTER_KEY){
    document.getElementById("lock").style.display = "none";
    document.getElementById("master").classList.add("active");
    selectChakra("c3");
    document.getElementById("master").scrollIntoView({ behavior:"smooth" });
  }else{
    document.getElementById("error").textContent = "パスワードが違います。";
  }
}

function toggleLayer(layer){
  const model = document.querySelector(".body-model");
  model.classList.toggle("show-" + layer);
}

function selectChakra(id){
  document.querySelectorAll(".chakra").forEach(el=>el.classList.remove("active"));
  const marker = document.querySelector("." + id);
  if(marker) marker.classList.add("active");

  const d = chakraData[id];
  document.getElementById("detail").innerHTML = `
    <h4>${d.title}</h4>
    <div class="sub">${d.sub}</div>
    ${section("身体 / Body", d.body)}
    ${section("神経系 / Nervous System", d.nerve)}
    ${section("内臓・内分泌 / Organs", d.organ)}
    ${section("感情・記憶 / Emotion", d.emotion)}
    ${section("問い / Questions", d.question)}
    <div class="note">
      ※これは学習補助用の対応表です。医学的診断ではなく、科学的知見・象徴体系・実践者の観察を区別しながら整理するための実験表示です。
    </div>
  `;

  const select = document.getElementById("noteChakra");
  const nameMap = {
    earth:"アーススターチャクラ", c1:"第一チャクラ", c2:"第二チャクラ",
    c3:"第三チャクラ", c4:"第四チャクラ", c5:"第五チャクラ",
    c6:"第六チャクラ", c7:"第七チャクラ"
  };
  if(select && nameMap[id]) select.value = nameMap[id];
}

function section(title, items){
  return `
    <div class="detail-section">
      <h5>${title}</h5>
      <ul>${items.map(i=>`<li>${i}</li>`).join("")}</ul>
    </div>
  `;
}

function copyNote(){
  const text = `
【Human OS / Observation Note】

名前：
${document.getElementById("noteName").value || "未記入"}

関連チャクラ：
${document.getElementById("noteChakra").value}

身体感覚：
${document.getElementById("noteBody").value || "未記入"}

感情・気づき：
${document.getElementById("noteEmotion").value || "未記入"}

関連しそうな知識・体験：
${document.getElementById("noteRelation").value || "未記入"}

未解決の問い：
${document.getElementById("noteQuestion").value || "未記入"}
`;

  navigator.clipboard.writeText(text).then(()=>{
    document.getElementById("copyStatus").textContent = "コピーしました。投稿欄やフォームへ貼り付けできます。";
  });
}

function clearNote(){
  ["noteName","noteBody","noteEmotion","noteRelation","noteQuestion"].forEach(id=>{
    document.getElementById(id).value = "";
  });
  document.getElementById("copyStatus").textContent = "メモ欄をクリアしました。";
}

document.addEventListener("keydown", e=>{
  if(e.key === "Enter" && document.getElementById("lock").style.display !== "none"){
    checkPassword();
  }
});

selectChakra("c3");
</script>

</body>
</html>
