<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow, noarchive" />
<title>Human OS — Atlas 3D</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#050018;color:#f4f1ff;font-family:"Yu Mincho","Hiragino Mincho ProN","Times New Roman",serif;overflow:hidden}
#scene{position:fixed;inset:0;z-index:1}
.top{position:fixed;top:0;left:0;right:0;z-index:10;padding:14px 22px;background:linear-gradient(180deg,rgba(5,0,24,.92),rgba(5,0,24,0));pointer-events:none}
.top .k{font-family:"Yu Gothic","Hiragino Sans",sans-serif;font-size:11px;letter-spacing:.22em;color:rgba(244,241,255,.5)}
.top h1{font-size:20px;font-weight:400;letter-spacing:.1em;margin-top:5px}
.top .law{font-size:11.5px;color:rgba(201,182,255,.85);margin-top:5px}

.panel{position:fixed;top:88px;z-index:10;border:1px solid rgba(244,241,255,.14);background:rgba(9,0,40,.6);backdrop-filter:blur(9px);padding:16px;max-height:calc(100% - 118px);overflow:auto}
.left{left:20px;width:250px}
.right{right:20px;width:330px}
.panel h3{font-family:"Yu Gothic",sans-serif;font-size:11px;letter-spacing:.16em;color:rgba(244,241,255,.5);margin:0 0 10px;font-weight:400}
.panel h3.mt{margin-top:20px}

.lbtn{display:block;width:100%;text-align:left;margin-bottom:7px;padding:8px 10px;background:transparent;border:1px solid rgba(244,241,255,.12);color:rgba(244,241,255,.82);cursor:pointer;font:inherit}
.lbtn.on{border-color:currentColor}
.lbtn .nm{display:flex;align-items:center;gap:8px;font-size:13px}
.lbtn .dot{width:10px;height:10px;border-radius:50%;background:currentColor}
.lbtn .meta{display:block;margin-top:4px;font-family:"Yu Gothic",sans-serif;font-size:10px;color:rgba(244,241,255,.42)}
.badge{font-family:"Yu Gothic",sans-serif;font-size:9px;letter-spacing:.06em;padding:1px 5px;border:1px solid currentColor;margin-right:5px}
.views{display:flex;gap:6px;flex-wrap:wrap}
.views button{flex:1;min-width:48px;font-family:"Yu Gothic",sans-serif;font-size:11px;padding:6px 4px;background:transparent;border:1px solid rgba(244,241,255,.14);color:rgba(244,241,255,.75);cursor:pointer}
.views button:hover{border-color:#c9b6ff;color:#fff}
.views button.on{border-color:#c9b6ff;color:#fff}
.rowlab{font-family:"Yu Gothic",sans-serif;font-size:11px;color:rgba(244,241,255,.55);margin:12px 0 6px;display:flex;justify-content:space-between}
.rowlab span{color:#c9b6ff}
input[type=range]{width:100%;accent-color:#c9b6ff}
.chk{display:flex;align-items:center;gap:8px;font-family:"Yu Gothic",sans-serif;font-size:12px;color:rgba(244,241,255,.75);cursor:pointer;margin-top:6px}

/* focus panel */
.f-kick{font-family:"Yu Gothic",sans-serif;font-size:10px;letter-spacing:.2em;color:rgba(244,241,255,.5)}
.f-title{display:flex;align-items:center;gap:10px;font-size:22px;letter-spacing:.06em;margin:8px 0 3px}
.f-title .fdot{width:16px;height:16px;border-radius:50%;box-shadow:0 0 12px currentColor;background:currentColor}
.f-sub{font-size:12px;color:rgba(244,241,255,.5);margin-bottom:16px}
.f-sec{margin-bottom:15px}
.f-sec h5{font-family:"Yu Gothic",sans-serif;font-size:10.5px;letter-spacing:.12em;color:#c9b6ff;margin-bottom:6px}
.f-sec .body{font-size:13px;line-height:1.85;color:rgba(244,241,255,.86)}
.f-sec .src{font-family:"Yu Gothic",sans-serif;font-size:10px;color:rgba(244,241,255,.4);margin-top:4px}
.f-sec ul{padding-left:1.05em;font-size:12.5px;line-height:1.7;color:rgba(244,241,255,.78)}
.tier{font-family:"Yu Gothic",sans-serif;font-size:9px;padding:1px 5px;border:1px solid;margin-left:6px;vertical-align:1px}
.tier.k{color:#8fd0c8;border-color:#8fd0c8}
.tier.m{color:#a9b6ff;border-color:#a9b6ff}
.tier.d{color:#c9a6ff;border-color:#c9a6ff}
.f-meaning{border-left:2px solid #c9b6ff;padding-left:12px;font-size:13.5px;line-height:1.9}
.f-note{margin-top:14px;padding-top:12px;border-top:1px solid rgba(244,241,255,.12);font-family:"Yu Gothic",sans-serif;font-size:10.5px;color:rgba(244,241,255,.45);line-height:1.7}

.hint{position:fixed;bottom:16px;left:20px;z-index:10;font-family:"Yu Gothic",sans-serif;font-size:11px;color:rgba(244,241,255,.45);line-height:1.8}
.hint b{color:#c9b6ff;font-weight:400}

/* LOCK (簡易パスワード錠 — 厳密なアクセス制限ではない) */
.lock{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(circle at 50% 38%,rgba(120,100,255,.12),transparent 30%),linear-gradient(180deg,#090032,#02000d)}
.lock.hidden{display:none}
.lock-box{width:min(430px,100%);border:1px solid rgba(244,241,255,.18);padding:40px 32px;text-align:center;background:rgba(255,255,255,.035);box-shadow:0 0 80px rgba(120,100,255,.08)}
.lock-box h1{font-size:24px;font-weight:400;letter-spacing:.16em;margin-bottom:10px}
.lock-box p{font-size:13px;color:rgba(244,241,255,.6);margin-bottom:24px;line-height:1.7}
.lock-box input{width:100%;padding:13px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);color:#fff;text-align:center;letter-spacing:.18em;margin-bottom:16px}
.lock-box button{padding:11px 26px;border:1px solid rgba(255,255,255,.24);background:transparent;color:#fff;letter-spacing:.16em;cursor:pointer;font:inherit}
.lock-box .err{color:#ffb6b6;font-size:12px;margin-top:14px;min-height:16px}
</style>
</head>
<body>

<div class="lock" id="lock">
  <div class="lock-box">
    <h1>ATLAS</h1>
    <p>チクラカムワザ受講者用の観察補助ページ（3Dアトラス）。<br>※簡易錠です。ソースからは確認できます。</p>
    <input id="password" type="password" placeholder="PASSWORD" autocomplete="off" />
    <button id="enterBtn">ENTER</button>
    <div class="err" id="lockErr"></div>
  </div>
</div>

<div class="top">
  <div class="k">HUMAN OS INSTITUTE / ATLAS — 3D 見本 v2</div>
  <h1>整った状態の、立体アトラス。</h1>
  <div class="law">掟：観たものを表現・記録する。真偽は証明しない。／ 身体は簡易素体（実解剖モデルに差し替え可）。</div>
</div>

<div id="scene"></div>

<!-- LEFT: layers + controls -->
<div class="panel left">
  <h3>レイヤー（種別を負う）</h3>
  <div id="layerList"></div>
  <h3 class="mt">視点</h3>
  <div class="views">
    <button data-v="front">前面</button><button data-v="side">側面</button>
    <button data-v="back">背面</button><button data-v="top">上から</button><button data-v="reset">戻す</button>
  </div>
  <h3 class="mt">断面（CT）— 天津金木</h3>
  <label class="chk"><input type="checkbox" id="clipOn" /> 断面で切る</label>
  <div class="views" style="margin-top:8px">
    <button data-plane="h" class="on">水平</button><button data-plane="s">矢状</button><button data-plane="c">前頭</button>
  </div>
  <label class="chk"><input type="checkbox" id="flipChk" /> 反転（向こう側から観る）</label>
  <div class="rowlab"><span id="clipLab">胸</span><span id="clipZ"></span></div>
  <input type="range" id="clip" min="-360" max="300" value="60" />
</div>

<!-- RIGHT: focus panel -->
<div class="panel right" id="focus"></div>

<div class="hint"><b>ドラッグ</b>＝回転（背面まで）／<b>ホイール</b>＝寄る引く／<b>チャクラをクリック</b>＝右に情報／<b>断面</b>＝面（水平・矢状）を選び、反転で向こう側から観る</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

/* ---- 簡易パスワード錠（厳密なアクセス制限ではない・ソースから確認可） ---- */
const ATLAS_KEY="chikura";
{ const lock=document.getElementById('lock'), pw=document.getElementById('password');
  function tryUnlock(){ if(pw.value===ATLAS_KEY){ lock.classList.add('hidden'); dispatchEvent(new Event('resize')); }
    else { document.getElementById('lockErr').textContent='パスワードが違います。'; } }
  document.getElementById('enterBtn').addEventListener('click',tryUnlock);
  pw.addEventListener('keydown',e=>{ if(e.key==='Enter') tryUnlock(); });
  pw.focus();
}

const mount=document.getElementById('scene');
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.localClippingEnabled=true;
mount.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.1,100);
camera.position.set(0,-0.15,9.6);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08; controls.target.set(0,-0.35,0);
controls.enablePan=true; controls.screenSpacePanning=true; controls.zoomToCursor=true;  // D案：カーソル位置へ寄る＋パンで全長を上下左右

scene.add(new THREE.AmbientLight(0x8a7fff,0.7));                       // 土台（どこも真っ黒にしない）
const dir=new THREE.DirectionalLight(0xffffff,0.6); scene.add(dir);   // 視点追従ヘッドランプ
/* 見ている側から照らす。ただし上・横にオフセット＝回り込んでも明るく、かつ凹凸（立体感）は残す */
const _cd=new THREE.Vector3(), _cr=new THREE.Vector3();
function updateLight(){
  camera.getWorldDirection(_cd);
  _cr.crossVectors(_cd, camera.up).normalize();
  dir.position.copy(camera.position).addScaledVector(_cr, 3).addScaledVector(camera.up, 4);
}

const clipPlane=new THREE.Plane(new THREE.Vector3(0,-1,0),100);
const materials=[];
function reg(m){ m.clippingPlanes=[clipPlane]; materials.push(m); return m; }

const groups={ body:new THREE.Group(), skeleton:new THREE.Group(), organ:new THREE.Group(), chakra:new THREE.Group(), model:new THREE.Group(), tenchi:new THREE.Group() };
Object.values(groups).forEach(g=>scene.add(g));

/* ---- GLTFLoader + DRACOLoader: models/skeleton.glb を groups.model へ ---- */
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath(
  'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/gltf/'
);

let skeletonMirror=null; // 半身glbのとき鏡像で全身にする用
let halfBtn=null;        // 「全身/半分」スイッチ（全身glbなら不要になる）

const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

gltfLoader.load(
  'models/skeleton.glb',
  (gltf)=>{
    // ==== つまみ ====
    const FIT_HEIGHT = 6.6;   // 縦幅
    const FIT_X      = 0;     // 左右（全身は対称なので基本0。ズレたら微調整）
    const FIT_Y      = -0.3;  // 上下
    const FIT_ROT_Y  = 0;     // 向き
    const MIRROR_SEAM= 0;     // 全身にした時、中央の継ぎ目に隙間/重なりがあれば調整（例 0.02 / -0.02）

    const half = gltf.scene;               // 読み込んだ本体（半身 or 全身）
    /* 半身(片側)か全身かを自動判定：bboxが x=0 の両側へ有意に伸びていれば全身 */
    const b0=new THREE.Box3().setFromObject(half);
    const spanX=Math.max(1e-6, b0.max.x-b0.min.x);
    const isFull = (b0.min.x<0 && b0.max.x>0 && Math.min(Math.abs(b0.min.x),Math.abs(b0.max.x)) > spanX*0.2);

    const modelRoot = new THREE.Group();
    modelRoot.add(half);
    if(!isFull){                           // 半身glb → 鏡像を足して全身に
      const mirror = half.clone(true);
      mirror.scale.x = -1;
      mirror.position.x = MIRROR_SEAM;
      mirror.traverse(o=>{ if(o.material) o.material.side = THREE.DoubleSide; }); // 反転面が消えないように
      skeletonMirror = mirror;
      modelRoot.add(mirror);
    } else if(halfBtn){ halfBtn.style.display='none'; }   // 全身glb → 「全身/半分」スイッチは役目終了（半身は矢状面CTで出せる）
    console.log('skeleton glb =', isFull ? 'full body (as-is)' : 'half (mirrored)');

    // 全身を基準に採寸・センタリング
    const box=new THREE.Box3().setFromObject(modelRoot);
    const size=new THREE.Vector3(); box.getSize(size);
    const center=new THREE.Vector3(); box.getCenter(center);
    modelRoot.position.sub(center);
    const pivot=new THREE.Group();
    pivot.add(modelRoot);
    const s=FIT_HEIGHT/(size.y||1);
    pivot.scale.setScalar(s);
    pivot.rotation.set(0,FIT_ROT_Y,0);
    pivot.position.set(FIT_X, FIT_Y, 0);
    // 水平断面(CT)を実骨格にも効かせる：読み込んだ全マテリアルに同じ切断面を渡す
    pivot.traverse(o=>{ if(o.isMesh && o.material){ (Array.isArray(o.material)?o.material:[o.material]).forEach(mm=>{ mm.clippingPlanes=[clipPlane]; mm.clipShadows=true; }); } });
    groups.model.add(pivot);

    console.log('Skeleton Loaded');
    console.log('model native size =', size.toArray().map(v=>+v.toFixed(3)));
    // 実骨格の各骨をクリック/ホバー対象に（名前つき）
    pivot.traverse(o=>{ if(o.isMesh && o.name){ o.userData.boneName=o.name; clickable.push({mesh:o, group:'model'}); } });
  },
  undefined,
  (err)=>{ console.error('Skeleton load error:', err); }
);

/* 天津金木：天地を貫く垂線（固定）＋ 各チャクラ階層へ上下する水平十字（前後×左右）。参照枠なので切断はしない */
let tenchiCross=null;
{ const mat=()=>new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.3});
  const axis=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.01,6.8,8),mat()); axis.position.y=-0.25; groups.tenchi.add(axis);
  tenchiCross=new THREE.Group();
  const armX=new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.008,2.6,6),mat()); armX.rotation.z=Math.PI/2; tenchiCross.add(armX);  // 左右
  const armZ=new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.008,2.0,6),mat()); armZ.rotation.x=Math.PI/2; tenchiCross.add(armZ);  // 前後
  groups.tenchi.add(tenchiCross); }

/* simplified translucent body — depthWrite:false なので内側の光を隠さない */
function bodyMat(){ return reg(new THREE.MeshStandardMaterial({color:0x9f95d6,transparent:true,opacity:0.1,roughness:.7,side:THREE.DoubleSide,depthWrite:false})); }
function part(geo,y,x=0,rot=0){ const me=new THREE.Mesh(geo,bodyMat()); me.position.set(x,y,0); if(rot)me.rotation.z=rot; groups.body.add(me); }
part(new THREE.SphereGeometry(0.5,24,20),2.2);
part(new THREE.CapsuleGeometry(0.32,0.5,8,16),1.55);
part(new THREE.CapsuleGeometry(0.9,1.9,10,20),0.15);
part(new THREE.CapsuleGeometry(0.19,1.9,6,12),-0.1,-1.0,0.12);
part(new THREE.CapsuleGeometry(0.19,1.9,6,12),-0.1,1.0,-0.12);
part(new THREE.CapsuleGeometry(0.27,2.0,8,14),-2.35,-0.42);
part(new THREE.CapsuleGeometry(0.27,2.0,8,14),-2.35,0.42);

const clickable=[]; // {mesh, group} — 全レイヤー横断のクリック対象

/* skeleton (クリック可能) */
{ const sm=reg(new THREE.MeshStandardMaterial({color:0xdfe4ee,roughness:.5}));
  function bone(mesh,id){ mesh.userData.id=id; groups.skeleton.add(mesh); clickable.push({mesh,group:'skeleton'}); }
  const spine=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.075,3.4,10),sm); spine.position.y=0.1; bone(spine,'spine');
  const pel=new THREE.Mesh(new THREE.TorusGeometry(0.4,0.055,8,20),sm); pel.position.y=-1.5; pel.rotation.x=Math.PI/2; bone(pel,'pelvis');
  const rib=new THREE.Mesh(new THREE.TorusGeometry(0.48,0.045,8,20),sm); rib.position.y=0.5; rib.rotation.x=Math.PI/2; rib.scale.z=0.6; bone(rib,'rib'); }

/* organs (クリック可能・depthWrite:false) */
const orgMat=()=>reg(new THREE.MeshStandardMaterial({color:0x8fd0c8,transparent:true,opacity:.6,roughness:.6,depthWrite:false}));
function organ(y,r,id,x=0){ const o=new THREE.Mesh(new THREE.SphereGeometry(r,16,12),orgMat()); o.position.set(x,y,0.05); o.userData.id=id; groups.organ.add(o); clickable.push({mesh:o,group:'organ'}); }
organ(0.55,0.3,'heartlung',-0.16); organ(0.55,0.26,'heartlung',0.2); organ(-0.05,0.3,'digest',0.04); organ(-0.7,0.36,'intestine'); organ(2.15,0.3,'brain');

/* chakra volumes (澄んだ理想形) */
const chakras=[
  {id:'earth',y:-3.9, color:0x6e1523, r:0.26},  // アース：足裏の下・ワインレッド
  {id:'c1',   y:-0.50,color:0xbd3333, r:0.20},  // 第一：尾てい骨
  {id:'c2',   y:-0.05,color:0xc77723, r:0.20},  // 第二：骨盤の中
  {id:'c3',   y:0.60, color:0xc9bd45, r:0.24},  // 第三：横隔膜（肋骨の下端）
  {id:'c4',   y:1.25, color:0x3fbd62, r:0.26},  // 第四：心臓（胸の中央）
  {id:'c5',   y:2.05, color:0x31b7c8, r:0.22},  // 第五：喉（喉頭・胸鎖関節の上／実骨格で確認）
  {id:'c6',   y:2.55, color:0x5f7dff, r:0.22},  // 第六：眉間
  {id:'c7',   y:3.05, color:0xb48cff, r:0.24},  // 第七：頭頂（頭蓋頂 y3.0 に半分載る）
];
/* 放射光テクスチャ（中心から外へ減衰する白い放射グラデ・色は各スプライトで着色） */
function glowTexture(){
  const s=128, cv=document.createElement('canvas'); cv.width=cv.height=s;
  const g=cv.getContext('2d'), grd=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
  grd.addColorStop(0.00,'rgba(255,255,255,1)');
  grd.addColorStop(0.16,'rgba(255,255,255,0.9)');
  grd.addColorStop(0.42,'rgba(255,255,255,0.35)');
  grd.addColorStop(0.72,'rgba(255,255,255,0.08)');
  grd.addColorStop(1.00,'rgba(255,255,255,0)');
  g.fillStyle=grd; g.fillRect(0,0,s,s);
  const t=new THREE.CanvasTexture(cv); t.needsUpdate=true; return t;
}
const GLOW_TEX=glowTexture();
const GLOW_SCALE=2.0;   // 放射光の広がり（半径＝r×これ。大きいほど遠くまで光る／隣と滲むなら下げる）
const CORE_SCALE=0.6;   // 中心の白熱コア（小さいほど点光源的・色が濁らない）

const chakraMeshes=[];
chakras.forEach(c=>{
  // 立体（断面CTで同心リングとして切れる本体・クリック対象）— 光は控えめに
  const m=reg(new THREE.MeshBasicMaterial({color:c.color,transparent:true,opacity:.22,blending:THREE.AdditiveBlending,depthWrite:false}));
  const mesh=new THREE.Mesh(new THREE.SphereGeometry(c.r,24,20),m);
  mesh.position.set(0,c.y,0); mesh.userData.id=c.id;
  // 放射光（カメラを向くビルボード・体を透かして常に光る）
  const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW_TEX,color:c.color,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,depthTest:false}));
  const gs=c.r*GLOW_SCALE*2; glow.scale.set(gs,gs,1); glow.position.copy(mesh.position); glow.renderOrder=2;
  // 中心の白熱コア
  const core=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW_TEX,color:0xffffff,opacity:0.8,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,depthTest:false}));
  const cs=c.r*CORE_SCALE*2; core.scale.set(cs,cs,1); core.position.copy(mesh.position); core.renderOrder=3;
  mesh.userData.glow=glow; mesh.userData.core=core; mesh.userData.baseGlow=gs;
  groups.chakra.add(glow); groups.chakra.add(mesh); groups.chakra.add(core);
  chakraMeshes.push(mesh); clickable.push({mesh,group:'chakra'});
});

/* ---- FOCUS content: 意味/手がかり/ケース は『チャクラその生命の原理』(利用者本文)より引用＝実践者の観察 ---- */

  chakraMeshes.forEach(m=>{ const sel=m.userData.id===id;
    m.scale.setScalar(sel?1.28:1); m.material.opacity=sel?.4:.22;
    const g=m.userData.glow; if(g){ const k=sel?1.4:1; g.scale.set(m.userData.baseGlow*k,m.userData.baseGlow*k,1); g.material.opacity=sel?1:0.85; }
  }); }
function selectItem(id){
  if(info[id]) selectChakra(id);
  else if(parts[id]){ current=id; renderPart(id); chakraMeshes.forEach(m=>{ m.scale.setScalar(1); m.material.opacity=.4; }); }
}

const R=9.6, CY=-0.15;
const viewPos={front:[0,CY,R],side:[R,CY,0],back:[0,CY,-R],top:[0,R,0.001],reset:[0,CY,R]};
document.querySelectorAll('.views button').forEach(btn=>{ btn.onclick=()=>{ const p=viewPos[btn.dataset.v]; camera.position.set(...p); controls.target.set(0,-0.35,0); }; });

/* ---- 断面（CT）: 天津金木・オプトイン切断（面一枚／反転可） ----
   スライダー＝十字の高さ Oy（各チャクラ階層へ上下）。選んだ面がそこで切る。
   THREE.Plane は normal·p + constant ≧ 0 の側を残す。 */
const clipOn=document.getElementById('clipOn'),clip=document.getElementById('clip'),clipLab=document.getElementById('clipLab'),clipZ=document.getElementById('clipZ'),flipChk=document.getElementById('flipChk');
let plane='h', flip=false;
function levelName(y){ if(y>2.7)return'頭頂';if(y>2.4)return'頭蓋上部';if(y>1.7)return'頭・眉間';if(y>1.1)return'喉・首';if(y>0.2)return'胸';if(y>-0.4)return'みぞおち';if(y>-1.2)return'臍下・腹';if(y>-2.6)return'骨盤・脚';if(y>-3.3)return'下腿';return'足首・足裏'; }
function nearChakra(y){ let best=null,bd=0.6; chakras.forEach(c=>{const dd=Math.abs(c.y-y); if(dd<bd){bd=dd;best=c;}}); return best?best.id:null; }
function setCutView(){ camera.position.set(...(plane==='h'?viewPos.top : plane==='s'?viewPos.side : viewPos.front)); controls.target.set(0,-0.35,0); }
function updateCut(){
  const v=(+clip.value)/100;                                                             // 選んだ面の法線方向の位置
  const on=clipOn.checked;
  if(!on){ clipPlane.normal.set(0,-1,0); clipPlane.constant=1e5; }                        // 切らない＝全て残す
  else if(plane==='h'){                                                                    // 水平面：高さ v で切る
    if(!flip){ clipPlane.normal.set(0,-1,0); clipPlane.constant=v; }                       //   上を消す＝下を残す
    else     { clipPlane.normal.set(0, 1,0); clipPlane.constant=-v; }                      //   反転：下を消す＝頭蓋の中を覗く
  } else if(plane==='s'){                                                                   // 矢状面：左右位置 v で切る（正中=0）
    if(!flip){ clipPlane.normal.set(-1,0,0); clipPlane.constant=v; }                       //   片側を残す（左右に掃ける）
    else     { clipPlane.normal.set( 1,0,0); clipPlane.constant=-v; }                      //   反転：反対側
  } else {                                                                                 // 前頭面（冠状）：前後位置 v で切る（正中=0）
    if(!flip){ clipPlane.normal.set(0,0,-1); clipPlane.constant=v; }                       //   後ろを残す（前後に掃ける）
    else     { clipPlane.normal.set(0,0, 1); clipPlane.constant=-v; }                      //   反転：前を残す
  }
  if(tenchiCross){ tenchiCross.position.set(plane==='s'?v:0, plane==='h'?v:0, plane==='c'?v:0); }  // 十字＝切断位置
  if(plane==='h'){ clipLab.textContent=levelName(v); clipZ.textContent='y='+v.toFixed(2); }
  else if(plane==='s'){ clipLab.textContent = Math.abs(v)<0.06?'矢状断（正中）':'矢状断（側方へ）'; clipZ.textContent='x='+v.toFixed(2); }
  else { clipLab.textContent = Math.abs(v)<0.06?'前頭断（正中）':'前頭断（前後へ）'; clipZ.textContent='z='+v.toFixed(2); }
  if(on && plane==='h'){ const id=nearChakra(v); if(id&&id!==current) selectChakra(id); }
}
document.querySelectorAll('[data-plane]').forEach(b=>{ b.onclick=()=>{ plane=b.dataset.plane;
  document.querySelectorAll('[data-plane]').forEach(x=>x.classList.toggle('on',x===b));
  if(plane==='h'){ clip.min=-360; clip.max=300; clip.value=60; }                          // 高さ（頭頂〜足裏）
  else if(plane==='s'){ clip.min=-130; clip.max=130; clip.value=0; }                      // 左右（正中=0、±で側方へ）
  else           { clip.min=-90; clip.max=90; clip.value=0; }                             // 前後（正中=0、±で前後へ）
  updateCut(); if(clipOn.checked) setCutView(); }; });
flipChk.onchange=()=>{ flip=flipChk.checked; updateCut(); };
clipOn.onchange=()=>{ updateCut(); if(clipOn.checked) setCutView(); };
clip.oninput=updateCut;

/* ---- 実骨格の骨：英名→和名（骨単位。左右は軸未確定なので付けない） ---- */
function boneJa(raw){ let m;
  if(/^Atlas_\(C1\)/.test(raw)) return '第1頸椎（環椎）';
  if(/^Axis_\(C2\)/.test(raw)) return '第2頸椎（軸椎）';
  if(m=raw.match(/^Cervical_vertebrae_\(C(\d)\)/)) return '第'+m[1]+'頸椎';
  if(m=raw.match(/^Thoracic_vertebrae_\(T(\d+)\)/)) return '第'+m[1]+'胸椎';
  if(m=raw.match(/^Lumbar_vertebrae_\(L(\d)\)/)) return '第'+m[1]+'腰椎';
  if(/^Sacrum/.test(raw)) return '仙骨';
  if(/^Coccyx/.test(raw)) return '尾骨';
  if(m=raw.match(/^Rib_\((\d+)\w+\)/)) return '第'+m[1]+'肋骨';
  if(m=raw.match(/^Costal_cart_of_(\d+)\w+_rib/)) return '第'+m[1]+'肋軟骨';
  if(/^Manubrium_of_sternum/.test(raw)) return '胸骨柄';
  if(/^Body_of_sternum/.test(raw)) return '胸骨体';
  if(m=raw.match(/^(\d)\w{0,2}_metacarpal/)) return '第'+m[1]+'中手骨';
  if(m=raw.match(/^(Proximal|Middle|Distal)_phalanx_of_.*_of_foot/)) return '足の'+({Proximal:'基節骨',Middle:'中節骨',Distal:'末節骨'}[m[1]]);
  if(m=raw.match(/^(Proximal|Middle|Distal)_phalanx_of_/)) return '手の'+({Proximal:'基節骨',Middle:'中節骨',Distal:'末節骨'}[m[1]]);
  if(/tooth|incisor|canine|premolar|molar/i.test(raw)){ const up=/^Upper/.test(raw)?'上':'下'; let t='歯'; if(/incisor/.test(raw))t='切歯'; else if(/canine/.test(raw))t='犬歯'; else if(/premolar/.test(raw))t='小臼歯'; else if(/molar/.test(raw))t='大臼歯'; return up+t; }
  const D=[[/^Frontal_bone/,'前頭骨'],[/^Occipital_bone/,'後頭骨'],[/^Sphenoid_bone/,'蝶形骨'],[/^Ethmoid_Bone/,'篩骨'],[/^Mandible_bone/,'下顎骨'],[/^Vomer$/,'鋤骨'],[/^Parietal_bone/,'頭頂骨'],[/^Temporal_bone/,'側頭骨'],[/^Nasal_bone/,'鼻骨'],[/^Lacrimal_bone/,'涙骨'],[/^Zygomatic_bone/,'頬骨'],[/^Maxilla_bone/,'上顎骨'],[/^Palatine_bone/,'口蓋骨'],[/^Inferior_nasal_concha/,'下鼻甲介'],[/^Hip_bone/,'寛骨'],[/^Femur/,'大腿骨'],[/^Patella/,'膝蓋骨'],[/^Tibia/,'脛骨'],[/^Fibula/,'腓骨'],[/^Humerus/,'上腕骨'],[/^Radius/,'橈骨'],[/^Ulna/,'尺骨'],[/^Clavicle/,'鎖骨'],[/^Scapula/,'肩甲骨'],[/^Scaphoid/,'舟状骨（手）'],[/^Lunate/,'月状骨'],[/^Triquetrum/,'三角骨'],[/^Pisiform/,'豆状骨'],[/^Trapezium/,'大菱形骨'],[/^Trapezoid/,'小菱形骨'],[/^Capitate/,'有頭骨'],[/^Hamate/,'有鈎骨'],[/^Talus/,'距骨'],[/^Calcaneus/,'踵骨'],[/^Navicular/,'舟状骨（足）'],[/^Cuboid/,'立方骨'],[/^Medial_cuneiform/,'内側楔状骨'],[/^Intermediate_cuneiform/,'中間楔状骨'],[/^Lateral_cuneiform/,'外側楔状骨'],[/^First_metatarsal/,'第1中足骨'],[/^Second_metatarsal/,'第2中足骨'],[/^Third_metatarsal/,'第3中足骨'],[/^Fourth_metatarsal/,'第4中足骨'],[/^Fifth_metatarsal/,'第5中足骨'],[/^Sesamoid_bones_of_hand/,'種子骨（手）'],[/^Sesamoid_bones_of_foot/,'種子骨（足）']];
  for(const [re,ja] of D){ if(re.test(raw)) return ja; }
  return raw.replace(/_/g,' ').replace(/\s*r$/,'').trim();   // フォールバック：整形英名
}
function renderBone(raw, point){
  const ja=boneJa(raw);
  const lvl = point?levelName(point.y):''; const chk = point?nearChakra(point.y):null;
  current=null; chakraMeshes.forEach(mm=>{ mm.scale.setScalar(1); mm.material.opacity=.4; });
  focusEl.innerHTML=`
    <div class="f-kick">FOCUS / BONE</div>
    <div class="f-title" style="color:#dfe4ee"><span class="fdot"></span>${ja}</div>
    <div class="f-sub">実骨格の部位（クリックで選択中）</div>
    <div class="f-sec"><h5>解説${tierTag('解剖')}</h5><div class="f-meaning">実解剖モデルの骨。英名：${raw.replace(/_/g,' ')}</div></div>
    <div class="f-sec"><h5>高さ・対応</h5><div class="body">およその高さ：${lvl}${chk&&info[chk]?'　／　近いチャクラ：'+info[chk].name:''}</div></div>
    <div class="f-note">実骨格＝解剖(実線・計測)の層。名称は Z-Anatomy系モデルのメッシュ名からの近似対応で、骨単位（粗面・棘突起等の下位部位は未分割）。左右は軸未確定のため未表示。真偽は証明しない。</div>`;
}

/* ---- raycast: クリック＆ホバー（クリップ面で切り落とした側は無視） ---- */
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2();
function ancestorsVisible(o){ while(o){ if(!o.visible) return false; o=o.parent; } return true; }
function pick(cx,cy){
  ndc.x=(cx/innerWidth)*2-1; ndc.y=-(cy/innerHeight)*2+1;
  ray.setFromCamera(ndc,camera);
  const targets=clickable.filter(c=>groups[c.group].visible && ancestorsVisible(c.mesh)).map(c=>c.mesh);
  const hits=ray.intersectObjects(targets,false);
  for(const h of hits){ if(!clipOn.checked || clipPlane.distanceToPoint(h.point)>=0) return h; }  // 残っている側の最初のヒット
  return null;
}
let downXY=null;
renderer.domElement.addEventListener('pointerdown',e=>{ downXY=[e.clientX,e.clientY]; });
renderer.domElement.addEventListener('pointerup',e=>{
  if(!downXY) return; const moved=Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1]); downXY=null;
  if(moved>6) return;
  const h=pick(e.clientX,e.clientY); if(!h) return;
  const o=h.object;
  if(o.userData.boneName) renderBone(o.userData.boneName, h.point);
  else if(o.userData.id) selectItem(o.userData.id);
});
/* hover：内容がある対象の上でカーソルを指に（間引き） */
let hoverT=0;
renderer.domElement.addEventListener('pointermove',e=>{
  if(downXY) return; const now=performance.now(); if(now-hoverT<50) return; hoverT=now;
  renderer.domElement.style.cursor = pick(e.clientX,e.clientY) ? 'pointer' : 'default';
});

/* ---- init / loop ---- */
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
renderOverview(); updateCut();
(function animate(){ requestAnimationFrame(animate); controls.update(); updateLight(); groups.chakra.rotation.y+=0.0008; renderer.render(scene,camera); })();
window.__ok=true;
</script>
